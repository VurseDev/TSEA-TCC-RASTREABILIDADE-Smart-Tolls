# fly.toml app configuration file generated for tsea-tcc-rastreabilidade-smart-tolls on 2026-06-04T22:20:52-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tsea-tcc-rastreabilidade-smart-tolls'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  # Database connection - set via fly secrets
  DB_HOST = 'localhost'
  DB_PORT = '5432'
  DB_NAME = 'RASTREABILIDADES_TSEA'
  DB_USER = 'postgres'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
