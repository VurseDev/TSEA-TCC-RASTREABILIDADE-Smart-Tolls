app = 'tsea-tcc-rastreabilidade-smart-tolls'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://+:8080'
  DB_HOST = 'tsea-db.internal'
  DB_PORT = '5433'
  DB_NAME = 'RASTREABILIDADES_TSEA'
  DB_USER = 'postgres'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
