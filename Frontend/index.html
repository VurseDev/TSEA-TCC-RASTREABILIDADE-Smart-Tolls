<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSEA Industrial Control</title>
    <style>
        /* MANTIDO SEU CSS ORIGINAL INTEGRALMENTE */
        :root { --tsea-red: #ff0000; --bg: #000; --card: #121212; --gray: #2d2d2d; --green: #28a745; --blue: #0056b3; --yellow: #ffcc00; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--tsea-red); padding: 15px 20px; }
        .btn-logout { background: transparent; color: var(--tsea-red); border: 1px solid var(--tsea-red); padding: 8px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-left: 4px solid var(--tsea-red); }
        .filter-bar { display: flex; gap: 10px; padding: 0 20px 10px 20px; flex-wrap: wrap; }
        .btn-filter { background: var(--gray); border: none; color: white; padding: 10px 15px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .search-container { padding: 0 20px 20px 20px; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; outline: none; }
        .table-container { padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: var(--tsea-red); font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        .container-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .main-card { background: var(--card); border: 1px solid #222; padding: 50px; border-radius: 25px; width: 500px; text-align: center; position: relative; }
        .laser-line { position: absolute; width: 95%; height: 2px; background: var(--tsea-red); box-shadow: 0 0 12px var(--tsea-red); top: 55%; left: 2.5%; pointer-events: none; z-index: 0; }
        .input-scan { position: relative; z-index: 1; background: transparent; border: 1px solid #333; color: white; padding: 18px; text-align: center; font-size: 1.4rem; width: 100%; margin-top: 20px; border-radius: 8px; }
        .btn-cadastro { background: none; border: 1px dashed #555; color: #888; padding: 10px; margin-top: 30px; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.3s; }
        .btn-cadastro:hover { border-color: var(--tsea-red); color: white; }
        .bell-btn { background: none; border: none; font-size: 20px; cursor: pointer; position: relative; color: white; }
        .alert-dot { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: red; border-radius: 50%; }
        .session-timer { color: var(--yellow); font-family: monospace; font-weight: bold; }
        #modalNotificacao { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; background: #111; border: 1px solid red; padding: 20px; z-index: 2000; display: none; }

<div id="app"></div>

<script>
    // --- CONFIGURAÇÃO BACKEND ---
    const API_URL = "http://localhost:5045"; // Ajuste para a porta do seu .NET

    let ativos = []; // Agora será preenchido pelo banco
    let currentUser = "";
    let currentUserId = ""; // Guardar o crachá para movimentações
    let timeLeft = 600;
    let timerInterval;
    let usuarioLogado = null;
    let ativosBackup = [];
    let ativosDashboardBackup = [];
    let notificacaoTimer = null;
    let notificacaoAtiva = false;
    let ferramentaAtrasada = null;

    // ... (suas funções carregarAtivos, mostrarAdmin, etc)


  function filtrarPorCodigo(valor) {
    const bipado = valor.trim().toUpperCase();
    
    if (bipado === "") {
        renderizarTabelaOficina(ativosBackup);
        return;
    }

    const filtrados = ativosBackup.filter(f => {
        const cod = (f.codigoBarras || f.CodigoBarras || "").toString().toUpperCase();
        return cod.includes(bipado);
    });

    renderizarTabelaOficina(filtrados);
}

function fecharModal() {
    const modal = document.getElementById('modalCadastro');
    if (modal) modal.remove();
}


    // 2. COLOQUE ESTA FUNÇÃO NO FINAL DO SCRIPT (Mas antes de mostrarLogin())
    function filtrarPorSetor(sufixo) {
        // Se clicar em GERAL (vazio), mostra a lista toda
        if (!sufixo) {
            renderizarTabelaAdmin(ativosBackup);
            return;
        }

        const filtrados = ativosBackup.filter(f => {
            // Pegamos o Setor que vem do banco
            const setorDB = (f.setor || f.Setor || "").toUpperCase();
            
            // Pegamos a Descrição (para ver se termina com M, S ou U)
            const desc = (f.descricao || f.Descricao || "").toUpperCase();

            // Lógica: Filtra se o setor for igual OU se a descrição terminar com a letra
            if (sufixo === 'MONTAGEM') return setorDB === 'MONTAGEM' || desc.endsWith('M');
            if (sufixo === 'SOLDAGEM') return setorDB === 'SOLDAGEM' || desc.endsWith('S');
            if (sufixo === 'USINAGEM') return setorDB === 'USINAGEM' || desc.endsWith('U');

            return setorDB === sufixo.toUpperCase();
        });

        renderizarTabelaAdmin(filtrados);
    }

    function resetTimer() { if(currentUser) timeLeft = 600; }

    function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if(currentUser) {
            timeLeft--;
            const el = document.getElementById('timerText');
            if(el) {
                let m = Math.floor(timeLeft/60);
                let s = (timeLeft%60).toString().padStart(2,'0');
                el.innerText = `EXPIRA EM: ${m}:${s}`;
            }
            if(timeLeft <= 0) {
                fazerLogout("EXPIRADO"); // Logout automático
            }
        }
    }, 1000);
}
    

function filtrarBusca(termo) {
    const termoLimpo = termo.toUpperCase().trim();
    
    // Se o campo estiver vazio, mostra a lista atual do dashboard
    if (termoLimpo === "") {
        renderizarTabelaAdmin(ativosDashboardBackup);
        return;
    }

    const filtrados = ativosDashboardBackup.filter(f => {
        const idOriginal = f.id || f.Id || 0;
        const codigoBarras = `TSEA-${String(idOriginal).padStart(3, '0')}`;
        return codigoBarras.includes(termoLimpo);
    });

    renderizarTabelaAdmin(filtrados);
}

function atualizarBellBadge(tem) {
    const bell = document.getElementById('bellButton');
    if (!bell) return;
    bell.innerHTML = tem ? `🔔 <span class="alert-dot"></span>` : '🔔';
}

function abrirNotificacaoAtraso() {
    if (notificacaoAtiva && ferramentaAtrasada) {
        mostrarNotificacaoAtraso(ferramentaAtrasada);
        return;
    }

    const ferramentasAtrasadas = ativosBackup.filter(f => {
        const status = ((f.status || f.Status || '').toString().toUpperCase());
        return status === 'EM_USO' || status === 'ATRASADO';
    });

    if (ferramentasAtrasadas.length === 0) {
        document.getElementById('modalNotificacao').style.display = 'block';
        document.getElementById('modalNotificacao').innerHTML = `
            <h2 style="color: #e60000; margin-top: 0;">Sem avisos</h2>
            <p>Não há ferramentas atrasadas ou em uso pendente de devolução no momento.</p>
            <button onclick="document.getElementById('modalNotificacao').style.display='none'" style="width:100%; background:#333; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">FECHAR</button>
        `;
        return;
    }

    ferramentaAtrasada = ferramentasAtrasadas[0];
    document.getElementById('modalNotificacao').style.display = 'block';
    mostrarNotificacaoAtraso(ferramentaAtrasada);
}

function mostrarNotificacaoAtraso(ferramenta) {
    const nomeColaborador = ferramenta.colaborador || ferramenta.Colaborador || 'Operador desconhecido';
    const descricao = ferramenta.descricao || ferramenta.Descricao || 'Ferramenta sem descrição';
    const codigo = ferramenta.codigoBarras || ferramenta.CodigoBarras || `ID ${ferramenta.id || ferramenta.Id}`;
    const status = ((ferramenta.status || ferramenta.Status || '').toString().toUpperCase());
    const motivo = status === 'ATRASADO'
        ? 'Esta ferramenta já está com status ATRASADO.'
        : 'Ela ficou em uso por mais de 30 segundos sem devolução.';

    document.getElementById('modalNotificacao').style.display = 'block';
    document.getElementById('modalNotificacao').innerHTML = `
        <h2 style="color: #e60000; margin-top: 0;">🚨 Aviso de ferramenta atrasada</h2>
        <p>O operador <strong>${nomeColaborador}</strong> está com a ferramenta:</p>
        <p style="font-weight:bold; color:white;">${descricao} (${codigo})</p>
        <p>${motivo} Envie um aviso para o operador.</p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="enviarAvisoAdmin()" style="flex:1; background:#e60000; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">ENVIAR AVISO</button>
            <button onclick="document.getElementById('modalNotificacao').style.display='none'" style="flex:1; background:#333; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">FECHAR</button>
        </div>
    `;
}

function abrirNotificacaoAtrasoOperador() {
    if (!currentUserId) {
        alert('Erro: usuário não identificado. Faça login novamente.');
        return;
    }

    fetch(`${API_URL}/avisos/${encodeURIComponent(currentUserId)}`)
        .then(res => res.ok ? res.json() : [])
        .then(avisoLista => {
            if (!avisoLista || avisoLista.length === 0) {
                document.getElementById('modalNotificacao').style.display = 'block';
                document.getElementById('modalNotificacao').innerHTML = `
                    <h2 style="color: #00cc00; margin-top: 0;">Tudo certo</h2>
                    <p>Você não possui avisos pendentes enviados pelo administrador.</p>
                    <button onclick="document.getElementById('modalNotificacao').style.display='none'" style="width:100%; background:#333; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">FECHAR</button>
                `;
                atualizarBellBadge(false);
                return;
            }

            const aviso = avisoLista[0];
            ferramentaAtrasada = aviso;
            notificacaoAtiva = true;
            atualizarBellBadge(true);
            mostrarNotificacaoOperador(aviso);
        })
        .catch(err => {
            console.error('Erro ao buscar avisos do operador:', err);
        });
}

function mostrarNotificacaoOperador(aviso) {
    const mensagem = aviso.mensagem || 'Você recebeu um aviso do administrador.';

    document.getElementById('modalNotificacao').style.display = 'block';
    document.getElementById('modalNotificacao').innerHTML = `
        <h2 style="color: #e60000; margin-top: 0;">🔔 Aviso do administrador</h2>
        <p>${mensagem}</p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="marcarAvisoLido(${aviso.id})" style="flex:1; background:#e60000; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">MARCAR COMO LIDO</button>
            <button onclick="document.getElementById('modalNotificacao').style.display='none'" style="flex:1; background:#333; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;">FECHAR</button>
        </div>
    `;
}

async function marcarAvisoLido(id) {
    try {
        const res = await fetch(`${API_URL}/avisos/${id}/lido`, { method: 'POST' });
        if (res.ok) {
            notificacaoAtiva = false;
            atualizarBellBadge(false);
            document.getElementById('modalNotificacao').style.display = 'none';
            await carregarAvisosOperador();
        } else {
            const text = await res.text();
            alert('Erro ao marcar aviso como lido: ' + text);
        }
    } catch (err) {
        console.error('Erro ao marcar aviso como lido:', err);
    }
}

async function enviarAvisoAdmin() {
    if (!ferramentaAtrasada) return;
    const operadorId = ferramentaAtrasada.colaboradorId || ferramentaAtrasada.ColaboradorId || '';
    const descricao = ferramentaAtrasada.descricao || ferramentaAtrasada.Descricao || 'ferramenta';
    const codigo = ferramentaAtrasada.codigoBarras || ferramentaAtrasada.CodigoBarras || `ID ${ferramentaAtrasada.id || ferramentaAtrasada.Id}`;

    if (!operadorId) {
        alert('Não foi possível enviar o aviso: identificador do operador não encontrado.');
        return;
    }

    try {
        const res = await fetch(`${API_URL}/avisos`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                FerramentaId: ferramentaAtrasada.id || ferramentaAtrasada.Id,
                UsuarioId: operadorId,
                Mensagem: `Você está atrasado na entrega da ferramenta ${descricao} (${codigo}). Favor devolver imediatamente.`
            })
        });

        if (res.ok) {
            alert('✅ Aviso enviado ao operador com sucesso!');
            document.getElementById('modalNotificacao').style.display = 'none';
        } else {
            const text = await res.text();
            alert('Erro ao enviar aviso: ' + text);
        }
    } catch (err) {
        console.error('Erro ao enviar aviso ao operador:', err);
        alert('Erro de conexão ao enviar aviso.');
    }
}

async function limparColaboradoresInvalidos() {
    if (!confirm('Tem certeza que deseja remover colaboradores não cadastrados das ferramentas?')) {
        return;
    }

    try {
        const res = await fetch(`${API_URL}/ferramentas/limpar-colaboradores`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (res.ok) {
            const resposta = await res.json();
            alert(`✅ ${resposta.mensagem}`);
            await mostrarAdmin();
        } else {
            const erro = await res.text();
            alert(`❌ Erro: ${erro}`);
        }
    } catch (err) {
        console.error('Erro ao limpar colaboradores:', err);
        alert('❌ Erro de conexão ao limpar colaboradores.');
    }
}

function atualizarCamposAdminCadastro() {
    const barcode = document.getElementById('cadCracha')?.value.trim().toUpperCase() || "";
    const adminFields = document.getElementById('adminFields');
    const mostrar = barcode.endsWith('A');
    if (adminFields) adminFields.style.display = mostrar ? 'block' : 'none';
}

async function cadastrarNoBanco() {
    const nome = document.getElementById('cadNome').value.trim();
    const barcode = document.getElementById('cadCracha').value.trim().toUpperCase();
    const setor = barcode.endsWith('A') ? 'ADMIN' : 'OPERADOR';

    if (!nome || !barcode) {
        alert("Preencha todos os campos!");
        return;
    }

    const senha = document.getElementById('cadSenha')?.value || '';
    const email = document.getElementById('cadEmail')?.value.trim() || '';
    if (setor === "ADMIN" && !senha) {
        alert("Senha obrigatória para cadastro de administrador.");
        return;
    }
    if (setor === "ADMIN" && !email) {
        alert("Email obrigatório para cadastro de administrador.");
        return;
    }

    try {
        const response = await fetch(`${API_URL}/usuarios/cadastrar`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json' 
            },
            // Note que usamos "Barcode" com B maiúsculo para bater com o C#
            body: JSON.stringify({ 
                nome: nome, 
                barcode: barcode, 
                setor: setor,
                password: senha,
                email: email
            })
        });

        if (response.ok) {
            alert("Funcionário cadastrado com sucesso!");
            mostrarLogin(); // Volta para a tela inicial
        } else {
            const erroTexto = await response.text();
            alert("Erro ao cadastrar: " + erroTexto);
        }
    } catch (error) {
        console.error("Erro na conexão:", error);
        alert("Não foi possível conectar ao servidor. Verifique se o Backend está rodando.");
    }
}




async function realizarLogin() {
    const barcode = document.getElementById('inputLogin').value;
    
    const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ barcode: barcode })
    });

    if (res.ok) {
        const dados = await res.json();
        
        // SALVA OS DADOS NA VARIÁVEL GLOBAL
        usuarioLogado = {
            nome: dados.nome,
            tipo: dados.tipo,
            barcode: barcode
        };

        if (usuarioLogado.tipo === 'ADMIN') {
            mostrarAdmin();
        } else {
            mostrarOperador();
        }
    } else {
        alert("Usuário não encontrado!");
    }
}
    // --- FUNÇÕES DE CONEXÃO (FETCH) ---

async function loginBackend(barcode) {
    let cracha  = normalizeScannerBarcode(barcode || document.getElementById('barcode')?.value || '');
    const senha   = document.getElementById('passwordLogin')?.value || '';
    const passwordWrapper = document.getElementById('passwordWrapper');
    const emailArea = document.getElementById('emailCadastroArea');
    const emailInput = document.getElementById('emailCadastro');
    const barcodeInput = document.getElementById('barcode');

    if (!cracha) {
        alert('Digite o crachá antes de entrar.');
        return;
    }

    const isAdmin = cracha.endsWith('A');

    // ✅ Se a área de email está visível, o admin clicou ENTRAR para finalizar o cadastro
    if (isAdmin && emailArea && emailArea.style.display !== 'none') {
        const email = emailInput?.value.trim();
        if (!email) {
            alert('Informe o email para continuar o cadastro.');
            emailInput?.focus();
            return;
        }

        // Tenta cadastrar o admin com os dados fornecidos
        const nomeInput = prompt('Informe seu nome completo para o cadastro:');
        if (!nomeInput) return;

        try {
            const res = await fetch(`${API_URL}/usuarios/cadastrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: nomeInput.trim(),
                    barcode: cracha,
                    setor: 'ADMIN',
                    password: senha,
                    email: email
                })
            });

            if (res.ok) {
                alert('✅ Admin cadastrado com sucesso! Faça o login agora.');
                emailArea.style.display = 'none';
                emailInput.value = '';
            } else {
                const erro = await res.text();
                alert('❌ Erro ao cadastrar: ' + erro);
            }
        } catch (err) {
            alert('❌ Erro de conexão com o servidor.');
        }
        return;
    }

    // Fluxo normal de login
    try {
        const response = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ Barcode: cracha, Password: senha })
        });

        if (response.ok) {
            const data = await response.json();
            currentUser   = data.nome;
            currentUserId = cracha;

            usuarioLogado = { nome: data.nome, tipo: data.tipo, barcode: cracha };

            if (data.tipo === 'ADMIN') {
                mostrarAdmin();
            } else {
                startTimer();
                mostrarOperador();
            }
        } else {
            const texto = await response.text();

            // ✅ Se for admin não cadastrado, mostra campo de email inline
            if (isAdmin && (texto.includes('não cadastrado') || response.status === 404)) {
                if (!senha) {
                    alert('Para cadastrar um novo admin, preencha também a senha acima.');
                    document.getElementById('passwordLogin')?.focus();
                    return;
                }
                if (emailArea) {
                    emailArea.style.display = 'block';
                    emailInput?.focus();
                }
                return;
            }

            // Se for admin e faltar senha, mostra o campo de senha
            if (isAdmin && texto.includes('Senha obrigatória para login de administrador.')) {
                if (passwordWrapper) {
                    passwordWrapper.style.display = 'block';
                }
                document.getElementById('passwordLogin')?.focus();
                return;
            }

            // Tentativa de fallback se o leitor inseriu um A extra no final e o usuário não existir
            if (cracha.endsWith('A') && texto.includes('Usuário não cadastrado.')) {
                const crachaSemA = cracha.slice(0, -1);
                if (crachaSemA) {
                    const fallbackResponse = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ Barcode: crachaSemA, Password: senha })
                    });

                    if (fallbackResponse.ok) {
                        const fallbackData = await fallbackResponse.json();
                        currentUser   = fallbackData.nome;
                        currentUserId = crachaSemA;

                        usuarioLogado = { nome: fallbackData.nome, tipo: fallbackData.tipo, barcode: crachaSemA };
                        if (barcodeInput) barcodeInput.value = crachaSemA;

                        if (fallbackData.tipo === 'ADMIN') {
                            mostrarAdmin();
                        } else {
                            startTimer();
                            mostrarOperador();
                        }
                        return;
                    }

                    const fallbackTexto = await fallbackResponse.text();
                    alert(fallbackTexto || texto || 'CRACHÁ NÃO ENCONTRADO OU SENHA INVÁLIDA.');
                    return;
                }
            }

            alert(texto || 'CRACHÁ NÃO ENCONTRADO OU SENHA INVÁLIDA.');
        }
    } catch (error) {
        console.error('Erro na requisição:', error);
        alert('Erro de conexão. O servidor está rodando na porta 5045?');
    }
}

async function salvarNovaSenha() {
    const codigoEl   = document.getElementById('codigoReset');
    const novaEl     = document.getElementById('novaSenha');
    const confirmarEl = document.getElementById('confirmarSenha');
    const feedback   = document.getElementById('feedbackReset');

    // LOG para debug
    console.log('Código elemento:', codigoEl);
    console.log('Código valor:', codigoEl?.value);

    const codigo    = codigoEl?.value?.trim() || '';
    const nova      = novaEl?.value || '';
    const confirmar = confirmarEl?.value || '';

    if (!codigo || codigo.length !== 6) {
        feedback.style.color = 'red';
        feedback.innerText = `Digite o código de 6 dígitos. (lido: "${codigo}")`;
        return;
    }

    if (!nova || nova.length < 6) {
        feedback.style.color = 'red';
        feedback.innerText = 'A senha deve ter pelo menos 6 caracteres.';
        return;
    }

    if (nova !== confirmar) {
        feedback.style.color = 'red';
        feedback.innerText = 'As senhas não coincidem.';
        return;
    }

    console.log('Enviando:', { Token: codigo, NovaSenha: nova });

    try {
        const res = await fetch(`${API_URL}/senha/redefinir`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Token: codigo, NovaSenha: nova })
        });

        const texto = await res.text();
        let mensagem = texto;
        try { mensagem = JSON.parse(texto).mensagem || texto; } catch {}

        if (res.ok) {
            feedback.style.color = '#28a745';
            feedback.innerText = '✅ ' + mensagem;
            setTimeout(() => mostrarLogin(), 2000);
        } else {
            feedback.style.color = 'red';
            feedback.innerText = '❌ ' + mensagem;
        }
    } catch (err) {
        feedback.style.color = 'red';
        feedback.innerText = '❌ Erro de conexão com o servidor.';
    }
}

async function realizarMovimentacao(tipo, ferramentaId) {
    const rota = tipo === 'RETIRAR' ? 'retirar' : 'devolver';
    const feedback = document.getElementById('feedback');
    
    const rawValue = ferramentaId.toString().trim();
    const apenasNumeros = rawValue.replace(/\D/g, '');
    const idNumerico = apenasNumeros && /^\d+$/.test(rawValue) ? parseInt(rawValue, 10) : NaN;
    const codigoUpper = rawValue.toUpperCase();

    const payload = {
        UsuarioId: currentUserId,
        FerramentaCodigoBarras: rawValue,
    };

    if (!Number.isNaN(idNumerico)) {
        payload.FerramentaId = idNumerico;
    }

    // Validação local antes de enviar para a API
    if (tipo === 'RETIRAR') {
        try {
            const resFerramentas = await fetch(`${API_URL}/ferramentas`);
            if (resFerramentas.ok) {
                const todasFerramentas = await resFerramentas.json();
                const correspondentes = todasFerramentas.filter(f => {
                    const idStr = String(f.Id || f.id || '');
                    const codigo = String(f.CodigoBarras || f.codigoBarras || '').trim().toUpperCase();
                    return idStr === rawValue || codigo === codigoUpper;
                });

                if (correspondentes.length > 1) {
                    alert('❌ Existem uma ferramenta com este código/ID. Remova a duplicata ou informe o administrador.');
                    return;
                }

                if (correspondentes.length === 1) {
                    const ferramenta = correspondentes[0];
                    const setor = String(ferramenta.Setor || ferramenta.setor || '').trim().toUpperCase();
                    if (setor === 'ALMOXERIFADO') {
                        alert('❌ Não é possível pegar, pois a ferramenta está no almoxerifado.');
                        return;
                    }

                    const status = String(ferramenta.Status || ferramenta.status || '').trim().toUpperCase();
                    if (status === 'EM_USO') {
                        alert('❌ Não é possível pegar, pois a ferramenta já está em uso.');
                        return;
                    }
                    if (status === 'MANUTENCAO') {
                        alert('❌ Não é possível pegar, pois a ferramenta está em manutenção.');
                        return;
                    }
                }
            }
        } catch (err) {
            console.warn('Não foi possível validar localmente a ferramenta antes da movimentação:', err);
        }
    }

    // LOG PARA DEBUG: Abra o F12 no navegador para ver isso
    console.log("Enviando:", payload);

    try {
        const response = await fetch(`${API_URL}/movimentacao/${rota}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        let textoResposta = await response.text();

        try {
            const json = JSON.parse(textoResposta);
            if (json.erro) textoResposta = json.erro;
            else if (json.mensagem) textoResposta = json.mensagem;
        } catch (err) {
            // não é JSON, usar o texto original
        }

        if (response.ok) {
            feedback.innerText = "✅ SUCESSO: " + textoResposta;
            feedback.style.color = "var(--green)";
        } else {
            feedback.innerText = "❌ ERRO: " + textoResposta;
            feedback.style.color = "red";
        }
    } catch (e) {
        feedback.innerText = "❌ ERRO DE CONEXÃO";
        feedback.style.color = "red";
    }
}

    novoCodigoInput.addEventListener('keydown', (e) => {

    });
    novoCodigoInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        if (_keyTimesNovo.length > 0 && (Date.now() - _keyTimesNovo[_keyTimesNovo.length - 1]) < 100) {

async function salvarFerramenta() {
    const cod = document.getElementById('novoCodigo').value.trim();
    const desc = document.getElementById('novaDescricao').value.trim();
    const setor = document.getElementById('novoSetor').value;

    if (!cod || !desc) {
        alert("⚠️ Preencha todos os campos!");
        return;
    }

    const novaF = {
        CodigoBarras: cod,
        Descricao: desc,
        Setor: setor,
        Status: 'DISPONIVEL',
        VidaUtil: 100
    };

    try {
        const res = await fetch(`${API_URL}/ferramentas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(novaF)
        });

        if (res.ok) {
            alert("✅ Cadastrada com sucesso!");
            document.getElementById('modalCadastro').remove();
            mostrarOficina();
        } else {
            const erro = await res.json();
            alert("❌ Erro: " + (erro.erro || "Falha ao salvar"));

    } catch (err) {
        alert("❌ Erro de conexão com o servidor.");
    }
}

        const codigo = (f.codigoBarras || f.CodigoBarras || f.codigo || f.Codigo || f.id || f.Id || "").toString().toUpperCase();
        const descricao = (f.descricao || f.Descricao || "").toString().toUpperCase();
        return codigo.includes(busca) || descricao.includes(busca);

    renderizarTabelaAlmoxerifado(filtrados);
}

function fecharModalRetirada() {
    const modal = document.getElementById('modalRetirada');
    if (modal) modal.remove();
}

async function confirmarRetiradaAlmoxerifado(ferramentaId) {
    const setorDestino = document.getElementById('setorDestino').value;

    if (!setorDestino) {
        alert('⚠️ Selecione um setor antes de confirmar!');
        return;
    }

    try {
        const response = await fetch(`${API_URL}/ferramentas/${ferramentaId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                Setor: setorDestino
            })
        });

        if (response.ok) {
            alert(`✅ Ferramenta movida para ${setorDestino} com sucesso!`);
            fecharModalRetirada();
            mostrarAlmoxerifado(); // Atualiza a lista
        } else {
            const erro = await response.text();
            alert(`❌ Erro: ${erro}`);
        }
    } catch (error) {
        console.error('Erro:', error);
        alert('❌ Erro de conexão com o servidor');
    }
}

function abrirModalFerramenta() {
    const nome = prompt("Digite o nome/descrição da ferramenta:");
    if (!nome) return;

    fetch(`${API_URL}/ferramentas/cadastrar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Descricao: nome, Status: "DISPONIVEL" })
    }).then(res => {
        if (res.ok) {
            alert("Ferramenta adicionada!");
            mostrarAdmin(); // Atualiza a lista
        }
    });
}

function mostrarLogin() {
    currentUser = "";
    clearInterval(timerInterval);

    document.getElementById('app').innerHTML = `
        <div class="container-center">
            <div class="main-card">
                <h1>TSEA <span style="color:red">SYSTEM</span></h1>
                <div style="position:relative"><div class="laser-line"></div>
                <input type="text" id="barcode" class="input-scan" placeholder="BIPE O CRACHÁ" autofocus></div>

    const barcodeInput   = document.getElementById('barcode');
    const passwordInput  = document.getElementById('passwordLogin');
    const passwordWrapper = document.getElementById('passwordWrapper');
    const togglePassword  = document.getElementById('togglePassword');
    const forgotButton   = document.getElementById('forgotPasswordButton');

    const updateLoginFields = () => {
        if (!barcodeInput) return;

        const cleanedValue = normalizeScannerBarcode(barcodeInput.value);
        if (cleanedValue !== barcodeInput.value) {
            barcodeInput.value = cleanedValue;
        }

        const isAdminInput = cleanedValue.toUpperCase().endsWith('A');
        if (isAdminInput) {
            if (passwordWrapper) passwordWrapper.style.display = 'block';
            if (forgotButton) forgotButton.style.display = 'block';
        } else {
            if (passwordWrapper) passwordWrapper.style.display = 'none';
            if (forgotButton) forgotButton.style.display = 'none';
        }

        // Se trocar o crachá, esconde a área de email novamente
        const emailArea = document.getElementById('emailCadastroArea');
        if (emailArea) emailArea.style.display = 'none';
    };

    const loginOnEnter = (e) => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        if (!barcodeInput) return;

        let cleanedValue = normalizeScannerBarcode(barcodeInput.value);

        // Se veio do scanner (Enter chegou menos de 100ms após última tecla), remove o char extra
        if (_keyTimes.length > 0 && (Date.now() - _keyTimes[_keyTimes.length - 1]) < 100) {
            if (cleanedValue.length > 1) cleanedValue = cleanedValue.slice(0, -1);
        }

        _keyTimes = [];
        barcodeInput.value = cleanedValue;

        const isAdminInput = cleanedValue.toUpperCase().endsWith('A');
        const passwordEmpty = !passwordInput?.value.trim();
        if (isAdminInput && passwordEmpty) {
            if (passwordWrapper) passwordWrapper.style.display = 'block';
            if (forgotButton) forgotButton.style.display = 'block';
            setTimeout(() => passwordInput?.focus(), 50);
            return;
        }

        loginBackend(cleanedValue);
    };

    let _keyTimes = [];

    if (barcodeInput) {
        barcodeInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') _keyTimes.push(Date.now());
        });
        barcodeInput.addEventListener('keydown', loginOnEnter);
        barcodeInput.focus();
    }
    if (passwordInput) passwordInput.addEventListener('keydown', loginOnEnter);
    if (togglePassword) {
        togglePassword.addEventListener('click', () => {
            if (!passwordInput) return;
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            togglePassword.textContent = isHidden ? '🙈' : '👁️';
            passwordInput.focus();
        });
    }
}

    function scan(m) {
    document.getElementById('app').innerHTML = `
        <div class="header">
            <button class="btn-logout" onclick="mostrarOperador()">← VOLTAR</button>
            <span id="timerText" class="session-timer"></span>
        </div>
        <div class="container-center">
            <div class="main-card">
                <h2>MODO ${m}</h2>
                <div style="position:relative">
                    <div class="laser-line"></div>
                    <input type="text" id="bipOp" class="input-scan" placeholder="BIPE A FERRAMENTA" autofocus>
                </div>
                <p id="feedback" style="font-weight:bold; margin-top:10px;"></p>
            </div>
        </div>`;

    const inputBip = document.getElementById('bipOp');
    inputBip.focus();

    let _keyTimesBip = [];
    inputBip.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') _keyTimesBip.push(Date.now());
    });

    inputBip.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            // Remove char extra do scanner
            if (_keyTimesBip.length > 0 && (Date.now() - _keyTimesBip[_keyTimesBip.length - 1]) < 100) {
                if (e.target.value.length > 1)
                    e.target.value = e.target.value.slice(0, -1);
            }
            _keyTimesBip = [];
            const valorDigitado = e.target.value.trim();
            
            if (valorDigitado === "") {
                document.getElementById('feedback').innerText = "POR FAVOR, BIPE UMA FERRAMENTA!";
                document.getElementById('feedback').style.color = "orange";
                return;
            }

            // Chama a movimentação passando o valor capturado AGORA
            realizarMovimentacao(m, valorDigitado);
            e.target.value = ""; // Limpa o campo para o próximo bip
        }
    });
}

    // Remove o char extra do scanner se Enter chegou < 100ms após última tecla
    function scannerSafeInput(inputEl, callback) {
        let _kt = [];
        inputEl.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') {
                _kt.push(Date.now());
            } else {
                if (_kt.length > 0 && (Date.now() - _kt[_kt.length - 1]) < 100) {
                    if (inputEl.value.length > 1)
                        inputEl.value = inputEl.value.slice(0, -1);
                }
                _kt = [];
                if (callback) callback(inputEl.value);
            }
        });
        // Também remove no keyup para campos que usam onkeyup
        inputEl.addEventListener('keyup', (e) => {
            if (e.key !== 'Enter' && _kt.length > 0) {
                // Verifica se o valor atual tem char extra (última digitação muito rápida)
                // Não faz nada aqui — só remove no Enter
            }
        });
    }

    function normalizeScannerBarcode(value) {
        if (!value) return '';
        var v = value;
        v = v.split('\r').join('');
        v = v.split('\n').join('');
        v = v.split('\t').join('');
        return v.trim().toUpperCase();
    }

    mostrarLogin();
