<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSEA Industrial Control</title>
    <style>
        /* MANTIDO SEU CSS ORIGINAL INTEGRALMENTE */
        :root { --tsea-red: #ff0000; --bg: #000; --card: #121212; --gray: #2d2d2d; --green: #28a745; --blue: #0056b3; --yellow: #ffcc00; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--tsea-red); padding: 15px 20px; }
        .btn-logout { background: transparent; color: var(--tsea-red); border: 1px solid var(--tsea-red); padding: 8px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-left: 4px solid var(--tsea-red); }
        .filter-bar { display: flex; gap: 10px; padding: 0 20px 10px 20px; flex-wrap: wrap; }
        .btn-filter { background: var(--gray); border: none; color: white; padding: 10px 15px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        .search-container { padding: 0 20px 20px 20px; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; outline: none; }
        .table-container { padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: var(--tsea-red); font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        .container-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .main-card { background: var(--card); border: 1px solid #222; padding: 50px; border-radius: 25px; width: 500px; text-align: center; position: relative; }
        .laser-line {
            position: absolute;
            width: 92%;
            height: 2px;
            background: var(--tsea-red);
            box-shadow: 0 0 8px var(--tsea-red), 0 0 20px var(--tsea-red), 0 0 40px rgba(230,0,0,0.4);
            left: 4%;
            pointer-events: none;
            z-index: 2;
            animation: laserScan 2s ease-in-out infinite;
        }
        @keyframes laserScan {
            0%   { top: 15%; opacity: 1; }
            45%  { top: 80%; opacity: 1; }
            50%  { top: 80%; opacity: 0.3; }
            55%  { top: 80%; opacity: 1; }
            100% { top: 15%; opacity: 1; }
        }
        .laser-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            display: block;
        }
        .laser-wrapper input {
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        .input-scan { position: relative; z-index: 1; background: transparent; border: 1px solid #333; color: white; padding: 18px; text-align: center; font-size: 1.4rem; width: 100%; margin-top: 20px; border-radius: 8px; }
        .btn-cadastro { background: none; border: 1px dashed #555; color: #888; padding: 10px; margin-top: 30px; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.3s; }
        .btn-cadastro:hover { border-color: var(--tsea-red); color: white; }
        .bell-btn { background: none; border: none; font-size: 20px; cursor: pointer; position: relative; color: white; display: inline-flex; align-items: center; }
        .alert-dot { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: red; border-radius: 50%; box-shadow: 0 0 6px red; }
        .session-timer { color: var(--yellow); font-family: monospace; font-weight: bold; }
        /* Overlay escuro de fundo */
        #modalNotificacao {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.82);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #modalNotificacao.ativo {
            display: flex !important;
        }
        /* Painel interno centralizado */
        #modalNotificacao > div {
            background: #111;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 24px;
            min-width: 340px;
            max-width: 560px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        /* No seu <style> */
.setor-S { border-left: 10px solid #ffcc00; } /* Solda - Amarelo */
.setor-M { border-left: 10px solid #0056b3; } /* Montagem - Azul */
.setor-P { border-left: 10px solid #28a745; } /* Pintura - Verde */

.badge-ferramenta {
    padding: 5px 10px;
    border-radius: 15px;
    font-size: 10px;
    font-weight: bold;
}

.filter-bar {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    background: #1a1a1a;
    margin: 0 20px 10px 20px;
    border-radius: 5px;
    align-items: center;
}

.btn-filter {
    background: #333;
    color: white;
    border: 1px solid #444;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
    transition: 0.3s;
}

.btn-filter:hover {
    background: var(--tsea-red);
    border-color: var(--tsea-red);
}

.menu-item {
    padding: 15px;
    color: #888;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}
.menu-item:hover, .menu-item.active {
    background: #111;
    color: white;
}
.setor-card {
    background: #121212;
    flex: 1;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    border-top: 3px solid transparent;
}
.setor-card:hover { border-top: 3px solid red; background: #181818; }

.status-badge {
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: bold;
}
.status-badge.disponivel { background: #004d00; color: #00ff00; }
.status-badge.em_uso { background: #333; color: #fff; }
.status-badge.atrasado { background: #4d0000; color: #ff0000; }

.progress-bar {
    width: 100px;
    height: 6px;
    background: #222;
    border-radius: 3px;
    position: relative;
}
.progress-bar::after {
    content: '';
    position: absolute;
    width: 65%;
    height: 100%;
    background: #00ff00;
    border-radius: 3px;
}
.status-badge.disponivel { background: #004d00; color: #00ff00; }
.status-badge.em_uso { background: #333; color: #fff; border: 1px solid #555; }
.status-badge.atrasado { background: #4d0000; color: #ff4444; border: 1px solid red; }

/* Indicador de Porta */
#indicadorPorta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
    border: 1px solid #333;
    transition: all 0.4s ease;
    background: #1a1a1a;
    cursor: default;
}
#indicadorPorta .porta-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
}
#indicadorPorta.porta-fechada { border-color: #00aa44; background: #001a0d; color: #00dd55; }
#indicadorPorta.porta-fechada .porta-dot { background: #00dd55; box-shadow: 0 0 6px #00dd55; }
#indicadorPorta.porta-aberta { border-color: #ffaa00; background: #1a1200; color: #ffcc44; }
#indicadorPorta.porta-aberta .porta-dot { background: #ffcc44; box-shadow: 0 0 6px #ffcc44; }
#indicadorPorta.porta-alerta { border-color: #ff3333; background: #1a0000; color: #ff4444; animation: portaAlertaPulse 0.8s ease-in-out infinite; }
#indicadorPorta.porta-alerta .porta-dot { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
#indicadorPorta.porta-desconhecida { border-color: #333; background: #111; color: #666; }
#indicadorPorta.porta-desconhecida .porta-dot { background: #555; }
@keyframes portaAlertaPulse {
    0%, 100% { box-shadow: 0 0 0px rgba(255,50,50,0.4); }
    50% { box-shadow: 0 0 12px rgba(255,50,50,0.7); }
}

   </style>
</head>
<body onclick="resetTimer()" onkeypress="resetTimer()">

<div id="app"></div>
<div id="modalNotificacao"></div>


<script>
    // --- CONFIGURAÇÃO BACKEND ---
    const API_URL = window.location.origin; // Use the deployed host/origin automatically

    function toggleSenha() {
        var pwd = document.getElementById('passwordLogin');
        var btn = pwd ? pwd.parentElement.querySelector('button') : null;
        if (!pwd) return;
        if (pwd.type === 'password') {
            pwd.type = 'text';
            if (btn) btn.style.color = '#e60000';
        } else {
            pwd.type = 'password';
            if (btn) btn.style.color = '#aaa';
        }
        pwd.focus();
    }

    function toggleCadSenhaFn() {
        var pwd = document.getElementById('cadSenha');
        var btn = pwd ? pwd.parentElement.querySelector('button') : null;
        if (!pwd) return;
        if (pwd.type === 'password') {
            pwd.type = 'text';
            if (btn) btn.style.color = '#e60000';
        } else {
            pwd.type = 'password';
            if (btn) btn.style.color = '#aaa';
        }
        pwd.focus();
    }

    let ativos = []; // Agora será preenchido pelo banco
    let currentUser = "";
    let currentUserId = ""; // Guardar o crachá para movimentações
    let timeLeft = 600;
    let timerInterval;
    let usuarioLogado = null;
    let ativosBackup = [];
    let ativosDashboardBackup = [];
    let notificacaoTimer = null;
    let notificacaoAtiva = false;
    let adminPollInterval = null;
    let portaPollInterval = null;
    let portaAlertaAtivo = false;
    // ─── POLLING OPERADOR: detecta aviso CONFIRMAR_RETIRADA ──────────────────
    let operadorAvisoPollInterval = null;
    let modalConfirmarAberto = false;

    function iniciarPollingAvisoOperador() {
        if (operadorAvisoPollInterval) clearInterval(operadorAvisoPollInterval);
        operadorAvisoPollInterval = setInterval(verificarAvisoConfirmarOperador, 4000);
        verificarAvisoConfirmarOperador(); // imediato
    }

    function pararPollingAvisoOperador() {
        if (operadorAvisoPollInterval) clearInterval(operadorAvisoPollInterval);
        operadorAvisoPollInterval = null;
    }

    async function verificarAvisoConfirmarOperador() {
        if (!currentUserId || modalConfirmarAberto) return;
        try {
            const res = await fetch(`${API_URL}/avisos/${encodeURIComponent(currentUserId)}`);
            if (!res.ok) return;
            const avisos = await res.json();
            const aviso = (avisos || []).find(a =>
                (a.mensagem || a.Mensagem || '').startsWith('CONFIRMAR_RETIRADA')
            );
            if (aviso) mostrarModalConfirmarRetirada(aviso);
        } catch(e) {}
    }

    function mostrarModalConfirmarRetirada(aviso) {
        if (modalConfirmarAberto) return;
        modalConfirmarAberto = true;

        const partes   = (aviso.mensagem || aviso.Mensagem || '').split('|');
        const codigo   = partes[1] || '---';
        const desc     = (partes[2] || 'Ferramenta').toUpperCase();
        const avisoId  = aviso.id || aviso.Id;

        // Remove modal anterior se existir
        document.getElementById('modalConfirmarRetirada')?.remove();

        const modal = document.createElement('div');
        modal.id = 'modalConfirmarRetirada';
        modal.style.cssText = [
            'position:fixed', 'inset:0', 'width:100%', 'height:100%',
            'background:rgba(0,0,0,0.93)', 'z-index:9999',
            'display:flex', 'flex-direction:column',
            'align-items:center', 'justify-content:center',
            'backdrop-filter:blur(4px)'
        ].join(';');

        modal.innerHTML = `
            <div style="text-align:center; max-width:480px; padding:0 20px;">
                <div style="font-size:48px; margin-bottom:16px; animation:portaAlertaPulse 1s ease-in-out infinite;">&#128680;</div>
                <h2 style="color:#ff3333; font-size:22px; margin:0 0 8px 0; text-transform:uppercase; letter-spacing:1px;">
                    Ferramenta Retirada Sem Registro
                </h2>
                <p style="color:#aaa; font-size:14px; margin:0 0 20px 0;">
                    O sensor detectou a retirada de uma ferramenta sem bipe no sistema.<br>
                    Confirme o que aconteceu para continuar.
                </p>

                <div style="background:#1a0000; border:1px solid #ff3333; border-radius:10px; padding:16px 20px; margin-bottom:28px; text-align:left;">
                    <div style="font-size:10px; color:#ff6666; font-weight:bold; letter-spacing:1px; margin-bottom:6px;">FERRAMENTA</div>
                    <div style="color:white; font-size:18px; font-weight:bold; margin-bottom:4px;">${desc}</div>
                    <div style="color:#ff9999; font-family:monospace; font-size:14px;">${codigo}</div>
                </div>

                <p style="color:#ffcc00; font-size:13px; margin:0 0 24px 0; font-weight:bold;">
                    &#9888; Selecione uma opcao para continuar. Esta tela nao fecha ate voce escolher.
                </p>

                <div style="display:flex; gap:16px; justify-content:center;">
                    <button onclick="responderConfirmarRetirada('RETIRAR', '${avisoId}', '${codigo}')"
                        style="width:180px; height:120px; background:#1a4d1a; border:2px solid #28a745;
                               border-radius:14px; color:#28a745; font-size:18px; font-weight:bold;
                               cursor:pointer; display:flex; flex-direction:column; align-items:center;
                               justify-content:center; gap:8px; transition:all 0.2s;"
                        onmouseover="this.style.background='#28a745';this.style.color='white'"
                        onmouseout="this.style.background='#1a4d1a';this.style.color='#28a745'">
                        <span style="font-size:32px;">&#128295;</span>
                        RETIREI EU
                    </button>
                    <button onclick="responderConfirmarRetirada('DEVOLVER', '${avisoId}', '${codigo}')"
                        style="width:180px; height:120px; background:#001a4d; border:2px solid #0056b3;
                               border-radius:14px; color:#4d9fff; font-size:18px; font-weight:bold;
                               cursor:pointer; display:flex; flex-direction:column; align-items:center;
                               justify-content:center; gap:8px; transition:all 0.2s;"
                        onmouseover="this.style.background='#0056b3';this.style.color='white'"
                        onmouseout="this.style.background='#001a4d';this.style.color='#4d9fff'">
                        <span style="font-size:32px;">&#128230;</span>
                        VOU DEVOLVER
                    </button>
                </div>

            </div>
        `;

        // Bloqueia fechar com ESC ou clique fora
        modal.addEventListener('click', (e) => { if (e.target === modal) e.stopPropagation(); });
        document.addEventListener('keydown', bloquearEsc);
        document.body.appendChild(modal);
    }

    function bloquearEsc(e) {
        if (e.key === 'Escape') e.preventDefault();
    }

    async function responderConfirmarRetirada(acao, avisoId, codigo) {
        // Marca aviso como lido
        try { await fetch(`${API_URL}/avisos/${avisoId}/lido`, { method: 'POST' }); } catch(e) {}

        // Remove listener de ESC e fecha modal
        document.removeEventListener('keydown', bloquearEsc);
        document.getElementById('modalConfirmarRetirada')?.remove();
        // Mantém modalConfirmarAberto = true para bloquear o polling enquanto estiver na tela de scan
        // Só é liberado quando o operador sair da tela de scan (mostrarOperador)

        // Executa a ação escolhida
        if (acao === 'RETIRAR') {
            scan('RETIRAR');
        } else {
            scan('DEVOLVER');
        }
    }

    let oficinaPollInterval = null;

    // Polling da oficina — verifica alertas de retirada sem registro a cada 10 segundos
    function iniciarPollingOficina() {
        if (oficinaPollInterval) clearInterval(oficinaPollInterval);
        verificarAlertasOficina();
        oficinaPollInterval = setInterval(verificarAlertasOficina, 10000);
    }

    function pararPollingOficina() {
        if (oficinaPollInterval) clearInterval(oficinaPollInterval);
        oficinaPollInterval = null;
    }

    async function verificarAlertasOficina() {
        try {
            const res = await fetch(`${API_URL}/ferramentas`);
            if (!res.ok) return;
            const ferramentas = await res.json();
            const alertas = ferramentas.filter(f =>
                (f.status || f.Status || '').toUpperCase() === 'AUSENTE_SEM_REGISTRO'
            );
            const bell = document.getElementById('bellOficina');
            if (!bell) return;
            if (alertas.length > 0) {
                bell.innerHTML = `&#128276;<span style="position:absolute;top:2px;right:2px;width:10px;height:10px;background:red;border-radius:50%;box-shadow:0 0 6px red;display:block;"></span>`;
                bell.title = alertas.length + ' alerta(s) de retirada sem registro';
            } else {
                bell.innerHTML = `&#128276;`;
                bell.title = 'Sem alertas';
            }
        } catch(e) {}
    }

    async function abrirNotificacoesOficina() {
        let ferramentas = [];
        try {
            const res = await fetch(`${API_URL}/ferramentas`);
            if (res.ok) ferramentas = await res.json();
        } catch(e) {}

        let avisosSemRegistro = [];
        try {
            const resAvisos = await fetch(`${API_URL}/avisos/${encodeURIComponent(currentUserId)}`);
            if (resAvisos.ok) {
                const todos = await resAvisos.json();
                avisosSemRegistro = (todos || []).filter(a =>
                    (a.mensagem || a.Mensagem || '').startsWith('RETIRADA_SEM_REGISTRO')
                );
            }
        } catch(e) {}

        if (avisosSemRegistro.length === 0) {
            _abrirModal(
                '<div style="text-align:center;font-size:32px;margin-bottom:12px;">&#x2705;</div>'
                + '<h2 style="color:#00cc00;margin:0 0 8px 0;font-size:16px;text-align:center;">Tudo certo na oficina</h2>'
                + '<p style="color:#666;font-size:13px;text-align:center;margin:0 0 16px 0;">Nenhuma ferramenta retirada sem registro.</p>'
                + '<button onclick="_fecharModal()" style="width:100%;background:#222;color:#aaa;border:1px solid #333;padding:12px;border-radius:8px;cursor:pointer;font-weight:bold;">FECHAR</button>'
            );
            return;
        }

        const cards = avisosSemRegistro.map(a => {
            const partes       = (a.mensagem || a.Mensagem || '').split('|');
            const codigo       = partes[1] || '-';
            const desc         = partes[2] || 'Ferramenta desconhecida';
            const operadorId   = partes[3] || '';
            const operadorNome = partes[4] || 'DESCONHECIDO';
            const avisoId      = a.id || a.Id;
            const rawData      = a.criadoEm || a.CriadoEm;
            const hora         = rawData ? new Date(rawData).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : '';
            const ferrAtual    = ferramentas.find(f =>
                (f.codigoBarras||f.CodigoBarras) === codigo ||
                ('TSEA-'+String(f.id||f.Id).padStart(3,'0')) === codigo
            );
            const jaDevolvida = ferrAtual && (ferrAtual.status||ferrAtual.Status||'').toUpperCase() === 'DISPONIVEL';
            const corBorda = jaDevolvida ? '#333' : '#ff3333';
            const corBg    = jaDevolvida ? '#111' : '#1a0000';
            const opa      = jaDevolvida ? '0.65' : '1';

            let btnHtml = '';
            if (!jaDevolvida && operadorId) {
                const safeId   = operadorId.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                const safeDesc = desc.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                const safeCod  = codigo.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                btnHtml = '<button onclick="enviarAvisoSemRegistroOficina(\''
                    + avisoId + "','" + safeId + "','" + safeDesc + "','" + safeCod + "', this)\""
                    + ' style="width:100%;background:#b30000;color:white;border:none;padding:9px;'
                    + 'border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;">'
                    + '&#128232; ENVIAR AVISO AO FUNCIONARIO</button>';
            } else if (jaDevolvida) {
                btnHtml = '<div style="text-align:center;color:#555;font-size:11px;padding:4px;">&#10003; Ferramenta ja devolvida</div>';
            } else {
                btnHtml = '<div style="text-align:center;color:#555;font-size:11px;padding:4px;">&#9888; Operador nao identificado na sessao</div>';
            }

            return '<div style="background:' + corBg + ';border:1px solid ' + corBorda
                + ';border-left:4px solid ' + corBorda + ';border-radius:8px;padding:14px 16px;margin-bottom:10px;opacity:' + opa + ';">'
                + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
                + '<span style="font-size:10px;color:#ff4444;font-weight:bold;letter-spacing:1px;">'
                + '&#128680; RETIRADA SEM REGISTRO' + (jaDevolvida ? ' &mdash; JA DEVOLVIDA' : '') + '</span>'
                + (hora ? '<span style="font-size:10px;color:#555;">' + hora + '</span>' : '')
                + '</div>'
                + '<div style="color:white;font-size:14px;font-weight:bold;margin-bottom:2px;">' + desc.toUpperCase() + '</div>'
                + '<div style="color:#ff8888;font-family:monospace;font-size:12px;margin-bottom:10px;">' + codigo + '</div>'
                + '<div style="background:#0d0000;border:1px solid #440000;border-radius:6px;padding:10px 12px;margin-bottom:10px;">'
                + '<div style="font-size:10px;color:#ff6666;font-weight:bold;letter-spacing:1px;margin-bottom:5px;">&#128100; OPERADOR NA SESSAO</div>'
                + '<div style="display:flex;align-items:center;gap:10px;">'
                + '<div style="background:#330000;border:1px solid #660000;border-radius:4px;padding:4px 10px;font-family:monospace;font-size:13px;color:#ffaaaa;font-weight:bold;">'
                + (operadorId || 'NAO IDENTIFICADO') + '</div>'
                + '<div style="color:#ddd;font-size:13px;">' + operadorNome.toUpperCase() + '</div>'
                + '</div></div>'
                + btnHtml
                + '</div>';
        }).join('');

        _abrirModal(
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'
            + '<div><h2 style="color:#e60000;margin:0;font-size:16px;">&#128276; Alertas da Oficina</h2>'
            + '<small style="color:#666;font-size:11px;">' + avisosSemRegistro.length + ' ocorrencia(s)</small></div>'
            + '<button onclick="_fecharModal()" style="background:none;border:none;color:#666;font-size:22px;cursor:pointer;">&times;</button>'
            + '</div>'
            + '<div style="overflow-y:auto;max-height:62vh;padding-right:4px;">' + cards + '</div>'
        );
    }

    async function enviarAvisoSemRegistroOficina(avisoId, operadorId, desc, codigo, btn) {
        btn.disabled = true;
        btn.textContent = 'Enviando...';
        try {

async function enviarAvisoAdminTodos() {
    const lista = window._ferramentasParaAviso || [];
    if (lista.length === 0) { alert('Nenhuma ferramenta para avisar.'); return; }

    let usuarios = [];
    try {
        const resU = await fetch(`${API_URL}/usuarios`);
        if (resU.ok) usuarios = await resU.json();
    } catch(e) {}

    let enviados = 0, erros = 0;

    for (const f of lista) {
        const descricao = f.descricao || f.Descricao || 'ferramenta';
        const codigo    = f.codigoBarras || f.CodigoBarras || ('TSEA-' + String(f.id || f.Id).padStart(3,'0'));
        const nomeColaborador = f.colaborador || f.Colaborador || '';
        let operadorId = f.colaboradorId || f.ColaboradorId || f.usuarioId || f.UsuarioId || '';

        if (!operadorId && nomeColaborador) {
            const u = usuarios.find(u => (u.nome || u.Nome || '').toUpperCase() === nomeColaborador.toUpperCase());
            if (u) operadorId = u.codigoBarras || u.CodigoBarras || '';
        }

        if (!operadorId) { erros++; continue; }

        try {
            const res = await fetch(`${API_URL}/avisos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    FerramentaId: f.id || f.Id,
                    UsuarioId: operadorId,
                    Mensagem: 'Voce esta atrasado na entrega da ferramenta ' + descricao + ' (' + codigo + '). Favor devolver imediatamente.'
                })
            });
            if (res.ok) enviados++; else erros++;
        } catch(e) { erros++; }
    }

    document.getElementById('modalNotificacao').classList.remove('ativo');
    if (erros === 0) {
        alert('Aviso enviado para ' + enviados + ' operador(es) com sucesso!');
    } else {
        alert('Avisos enviados: ' + enviados + '. Não foi possível enviar para: ' + erros + ' (operador sem cadastro ou erro de conexão).');
    }
}

async function loginBackend(barcode) {

    let cracha  = normalizeScannerBarcode(barcode || document.getElementById('barcode')?.value || '');

    const senha   = document.getElementById('passwordLogin')?.value || '';

    const passwordWrapper = document.getElementById('passwordWrapper');

    const emailArea = document.getElementById('emailCadastroArea');

    const emailInput = document.getElementById('emailCadastro');

    const barcodeInput = document.getElementById('barcode');



    if (!cracha) {

        alert('Digite o crachá antes de entrar.');

        return;

    }



    const isAdmin = cracha.endsWith('A');



    //  Se a área de email está visível, o admin clicou ENTRAR para finalizar o cadastro

    if (isAdmin && emailArea && emailArea.style.display !== 'none') {

        const email = emailInput?.value.trim();

        if (!email) {

            alert('Informe o email para continuar o cadastro.');

            emailInput?.focus();

            return;

        }



        // Tenta cadastrar o admin com os dados fornecidos

        const nomeInput = prompt('Informe seu nome completo para o cadastro:');

        if (!nomeInput) return;



        try {

            const res = await fetch(`${API_URL}/usuarios/cadastrar`, {

                method: 'POST',

                headers: { 'Content-Type': 'application/json' },

                body: JSON.stringify({

                    nome: nomeInput.trim(),

                    barcode: cracha,

                    setor: 'ADMIN',

                    password: senha,

                    email: email

                })

            });



            if (res.ok) {

                alert(' Admin cadastrado com sucesso! Faça o login agora.');

                emailArea.style.display = 'none';

                emailInput.value = '';

            } else {

                const erro = await res.text();

                alert(' Erro ao cadastrar: ' + erro);

            }

        } catch (err) {

            alert(' Erro de conexão com o servidor.');

        }

        return;

    }



    // Fluxo normal de login

    try {

        const response = await fetch(`${API_URL}/login`, {

            method: 'POST',

            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },

            body: JSON.stringify({ Barcode: cracha, Password: senha })

        });



       if (response.ok) {
            const data = await response.json();
            currentUser   = data.nome;
            currentUserId = cracha;

            usuarioLogado = { nome: data.nome, tipo: data.tipo, barcode: cracha };

            //  ADICIONE ESTAS DUAS LINHAS AQUI PARA SALVAR OS DADOS DO OPERADOR:
            localStorage.setItem("usuarioId", cracha.toUpperCase());
            localStorage.setItem("setorUsuario", data.tipo.toUpperCase());

            if (data.tipo === 'ADMIN') {
                mostrarAdmin();
            } else {
                startTimer();
                mostrarOperador();
            }
    
        } else {

            const texto = await response.text();



            //  Se for admin não cadastrado, mostra campo de email inline

            if (isAdmin && (texto.includes('não cadastrado') || response.status === 404)) {

                if (!senha) {

                    alert('Para cadastrar um novo admin, preencha também a senha acima.');

                    document.getElementById('passwordLogin')?.focus();

                    return;

                }

                if (emailArea) {

                    emailArea.style.display = 'block';

                    emailInput?.focus();

                }

                return;

            }



            // Se for admin e faltar senha, mostra o campo de senha

            if (isAdmin && texto.includes('Senha obrigatória para login de administrador.')) {

                if (passwordWrapper) {

                    passwordWrapper.style.display = 'block';

                }

                document.getElementById('passwordLogin')?.focus();

                return;

            }



            // Tentativa de fallback se o leitor inseriu um A extra no final e o usuário não existir

            if (cracha.endsWith('A') && texto.includes('Usuário não cadastrado.')) {

                const crachaSemA = cracha.slice(0, -1);

                if (crachaSemA) {

                    const fallbackResponse = await fetch(`${API_URL}/login`, {

                        method: 'POST',

                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },

                        body: JSON.stringify({ Barcode: crachaSemA, Password: senha })

                    });



                    if (fallbackResponse.ok) {

                        const fallbackData = await fallbackResponse.json();

                        currentUser   = fallbackData.nome;

                        currentUserId = crachaSemA;



                        usuarioLogado = { nome: fallbackData.nome, tipo: fallbackData.tipo, barcode: crachaSemA };

                        if (barcodeInput) barcodeInput.value = crachaSemA;



                        if (fallbackData.tipo === 'ADMIN') {

                            mostrarAdmin();

                        } else {

                            startTimer();

                            mostrarOperador();

                        }

                        return;

                    }



                    const fallbackTexto = await fallbackResponse.text();

                    alert(fallbackTexto || texto || 'CRACHÁ NÃO ENCONTRADO OU SENHA INVÁLIDA.');

                    return;

                }

            }



            alert(texto || 'CRACHÁ NÃO ENCONTRADO OU SENHA INVÁLIDA.');

        }

    } catch (error) {

        console.error('Erro na requisição:', error);

        alert('Erro de conexão. O servidor está rodando na porta 5045?');

    }

}

async function salvarNovaSenha() {
    const codigoEl   = document.getElementById('codigoReset');
    const novaEl     = document.getElementById('novaSenha');
    const confirmarEl = document.getElementById('confirmarSenha');
    const feedback   = document.getElementById('feedbackReset');

    // LOG para debug
    console.log('Código elemento:', codigoEl);
    console.log('Código valor:', codigoEl?.value);

    const codigo    = codigoEl?.value?.trim() || '';
    const nova      = novaEl?.value || '';
    const confirmar = confirmarEl?.value || '';

    if (!codigo || codigo.length !== 6) {
        feedback.style.color = 'red';
        feedback.innerText = `Digite o código de 6 dígitos. (lido: "${codigo}")`;
        return;
    }

    if (!nova || nova.length < 6) {
        feedback.style.color = 'red';
        feedback.innerText = 'A senha deve ter pelo menos 6 caracteres.';
        return;
    }

    if (nova !== confirmar) {
        feedback.style.color = 'red';
        feedback.innerText = 'As senhas não coincidem.';
        return;
    }

    console.log('Enviando:', { Token: codigo, NovaSenha: nova });

    try {
        const res = await fetch(`${API_URL}/senha/redefinir`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Token: codigo, NovaSenha: nova })
        });

        const texto = await res.text();
        let mensagem = texto;
        try { mensagem = JSON.parse(texto).mensagem || texto; } catch {}

        if (res.ok) {
            feedback.style.color = '#28a745';
            feedback.innerText = ' ' + mensagem;
            setTimeout(() => mostrarLogin(), 2000);
        } else {
            feedback.style.color = 'red';
            feedback.innerText = ' ' + mensagem;
        }
    } catch (err) {
        feedback.style.color = 'red';
        feedback.innerText = ' Erro de conexão com o servidor.';
    }
}

async function realizarMovimentacao(tipo, ferramentaId) {
    const rota = tipo === 'RETIRAR' ? 'retirar' : 'devolver';
    const feedback = document.getElementById('feedback');
    
    const rawValue = ferramentaId.toString().trim().toUpperCase();

    // Busca a ferramenta pelo CodigoBarras OU pelo ID numérico extraído de TSEA-00X
    let ferramentaEncontrada = null;
    try {
        const resFerramentas = await fetch(`${API_URL}/ferramentas`);
        if (resFerramentas.ok) {
            const todasFerramentas = await resFerramentas.json();

            // Extrai número do padrão TSEA-001 → 1
            const matchTsea = rawValue.match(/^TSEA-0*(\d+)$/);
            const idExtraido = matchTsea ? parseInt(matchTsea[1], 10) : NaN;

            ferramentaEncontrada = todasFerramentas.find(f => {
                const codigo = String(f.codigoBarras || f.CodigoBarras || '').trim().toUpperCase();
                const idBanco = f.id || f.Id;

                // Bate pelo código de barras
                if (codigo && codigo === rawValue) return true;
                // Bate pelo ID extraído do padrão TSEA-001
                if (!isNaN(idExtraido) && idBanco == idExtraido) return true;
                // Bate pelo número puro digitado
                if (/^\d+$/.test(rawValue) && idBanco == parseInt(rawValue, 10)) return true;
                return false;
            });
        }
    } catch (err) {
        console.warn('Erro ao buscar ferramentas para validação:', err);
    }

    if (!ferramentaEncontrada) {
        feedback.innerText = " Ferramenta não encontrada. Verifique o código de barras.";
        feedback.style.color = "red";
        return;
    }

    // Validações antes de enviar
    if (tipo === 'RETIRAR') {
        const setor  = String(ferramentaEncontrada.setor  || ferramentaEncontrada.Setor  || '').trim().toUpperCase();
        const status = String(ferramentaEncontrada.status || ferramentaEncontrada.Status || '').trim().toUpperCase();

        if (setor === 'ALMOXERIFADO' || setor === 'GERAL' || setor === '') {
            feedback.innerText = " Esta ferramenta está no almoxarifado. Solicite ao administrador para movê-la.";
            feedback.style.color = "orange";
            return;
        }
        if (status === 'EM_USO') {
            feedback.innerText = " Esta ferramenta já está em uso por outro colaborador.";
            feedback.style.color = "red";
            return;
        }
        if (status === 'MANUTENCAO') {
            feedback.innerText = " Esta ferramenta está em manutenção e não pode ser retirada.";
            feedback.style.color = "red";
            return;
        }
    }

    // Monta payload com o ID numérico real encontrado
    const payload = {
        UsuarioId: currentUserId,
        FerramentaId: ferramentaEncontrada.id || ferramentaEncontrada.Id,
        FerramentaCodigoBarras: rawValue,
    };

    console.log("Enviando:", payload);

    try {
        const response = await fetch(`${API_URL}/movimentacao/${rota}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        let textoResposta = await response.text();
        try {
            const json = JSON.parse(textoResposta);
            if (json.erro) textoResposta = json.erro;
            else if (json.mensagem) textoResposta = json.mensagem;
            else if (json.colaborador) textoResposta = `Retirado por ${json.colaborador}`;
        } catch (err) { /* texto simples, ok */ }

        if (response.ok) {
            feedback.innerText = " SUCESSO: " + textoResposta;
            feedback.style.color = "var(--green)";
        } else {
            feedback.innerText = " ERRO: " + textoResposta;
            feedback.style.color = "red";
        }
    } catch (e) {
        feedback.innerText = " ERRO DE CONEXÃO";
        feedback.style.color = "red";
    }
}

function renderizarTabelaAdmin(lista) {
    const corpo = document.getElementById('listaAtivosAdmin');
    if (!corpo) return;

    if (!lista || lista.length === 0) {
        corpo.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#555;">Nenhum ativo encontrado.</td></tr>`;
        return;
    }

    corpo.innerHTML = lista.map(f => {
        // Mapeamento exato das propriedades que vem do seu C#
        const idOriginal = f.id || f.Id || 0;
        const descricao = f.descricao || f.Descricao || "SEM DESCRIÇÃO";
        const statusVal = (f.status || f.Status || "DISPONIVEL").toUpperCase();
        const vidaUtil = f.vidaUtil !== undefined ? f.vidaUtil : (f.VidaUtil || 0);
        
        // Aqui está o segredo: Pegar o Colaborador que enviamos no Join do C#
        const colabNome = f.colaborador || f.Colaborador || "---";

        const codigoBarras = `TSEA-${String(idOriginal).padStart(3, '0')}`;

        const codigoBarrasReal = f.codigoBarras || f.CodigoBarras || f.Codigo || f.codigo || `TSEA-${String(idOriginal).padStart(3, '0')}`;
        return `
            <tr style="border-bottom: 1px solid #1a1a1a;">
                <td style="padding: 15px; color: ${colabNome === '---' ? '#555' : '#fff'}; font-weight: bold;">
                    ${colabNome.toUpperCase()}
                </td>
                <td>
                    <b style="color: #fff;">${descricao.toUpperCase()}</b><br>
                    <small style="color: red; font-weight: bold;">${codigoBarrasReal}</small>
                </td>
                <td style="width: 150px;">
                    <div class="progress-bar" style="background: #222; height: 8px; border-radius: 4px; overflow: hidden; position: relative;">
                        <div style="background: ${vidaUtil < 30 ? 'red' : '#00ff00'}; width: ${vidaUtil}%; height: 100%;"></div>

                <td>
                    <span class="status-badge ${statusVal.toLowerCase().replace(' ', '_')}">

}

async function salvarFerramenta() {
    const cod = document.getElementById('novoCodigo').value.trim();
    const desc = document.getElementById('novaDescricao').value.trim();
    const setor = document.getElementById('novoSetor').value;

    if (!cod || !desc) {
        alert(" Preencha todos os campos!");
        return;
    }

    const novaF = {
        CodigoBarras: cod,
        Descricao: desc,
        Setor: setor,
        Status: 'DISPONIVEL',
        VidaUtil: 100
    };

    try {
        const res = await fetch(`${API_URL}/ferramentas`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(novaF)
        });

        if (res.ok) {
            alert(" Cadastrada com sucesso!");
            document.getElementById('modalCadastro').remove();
            mostrarOficina();
        } else {
            const erro = await res.json();
            alert(" Erro: " + (erro.erro || "Falha ao salvar"));
        }
    } catch (err) {
        alert(" Erro de conexão com o servidor.");
    }
}

async function atualizarFerramenta(id) {
    const desc = document.getElementById('editDescricao').value.trim();
    const setor = document.getElementById('editSetor').value;

    if (!desc) {
        alert('Preencha a descrição antes de salvar.');
        return;
    }

    try {
        const res = await fetch(`${API_URL}/ferramentas/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Descricao: desc, Setor: setor })
        });

        if (res.ok) {
            alert(' Alterações salvas com sucesso!');
            document.getElementById('modalCadastro').remove();
            mostrarOficina();
        } else {
            const erro = await res.text();
            alert(' Erro ao atualizar: ' + erro);
        }
    } catch (err) {
        alert(' Erro de conexão com o servidor.');
    }
}

function renderizarTabelaAlmoxerifado(lista) {
    const corpo = document.getElementById('tabelaAlmoxerifadoCorpo');

        corpo.innerHTML = `
            <tr>
                <td colspan="3" style="padding: 25px; text-align: center; color: #999;">Nenhuma ferramenta encontrada.</td>

        const descAlm = f.descricao || f.Descricao || "Sem descrição";
        return `

function filtrarAlmoxerifado(termo) {
    const busca = termo.toUpperCase().trim();
    if (busca === "") {
        renderizarTabelaAlmoxerifado(ativosBackup);
        return;
    }
    const filtrados = ativosBackup.filter(f => {
        const codigo   = (f.CodigoBarras || f.codigoBarras || ("TSEA-" + String(f.Id || f.id).padStart(3,"0"))).toString().toUpperCase();
        const descricao = (f.descricao || f.Descricao || "").toString().toUpperCase();
        return codigo.includes(busca) || descricao.includes(busca);
    });
    renderizarTabelaAlmoxerifado(filtrados);
}

        if (e.key !== 'Enter') return;
        e.preventDefault();
        if (!barcodeInput) return;

        let cleanedValue = normalizeScannerBarcode(barcodeInput.value);

       
        if (_keyTimes.length > 0 && (Date.now() - _keyTimes[_keyTimes.length - 1]) < 100) {
            if (cleanedValue.length > 1) cleanedValue = cleanedValue.slice(0, -1);
        }

        _keyTimes = [];
        barcodeInput.value = cleanedValue;

        const isAdminInput = cleanedValue.toUpperCase().endsWith('A');
        const passwordEmpty = !passwordInput?.value.trim();
        if (isAdminInput && passwordEmpty) {
            if (passwordWrapper) passwordWrapper.style.display = 'block';
            if (forgotButton) forgotButton.style.display = 'block';
            setTimeout(() => passwordInput?.focus(), 50);
            return;
        }

        loginBackend(cleanedValue);
    };

    let _keyTimes = [];

    if (barcodeInput) {
        barcodeInput.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') _keyTimes.push(Date.now());
        });
        barcodeInput.addEventListener('keydown', loginOnEnter);
        barcodeInput.focus();
    }
    if (passwordInput) passwordInput.addEventListener('keydown', loginOnEnter);
}

                <button id="rDiario" onclick="selecionarPeriodo('DIARIO')" style="flex:1;padding:12px;border-radius:8px;border:2px solid #e60000;background:#1a0000;color:white;cursor:pointer;font-weight:bold;"> Diário</button>
                <button id="rMensal" onclick="selecionarPeriodo('MENSAL')" style="flex:1;padding:12px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#888;cursor:pointer;"> Mensal</button>
                <button id="rAnual"  onclick="selecionarPeriodo('ANUAL')"  style="flex:1;padding:12px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#888;cursor:pointer;"> Anual</button>
            </div>

            <div id="inputDiario" style="margin-bottom:20px;">
                <label style="display:block;color:#aaa;font-size:12px;margin-bottom:6px;">Data</label>
                <input type="date" id="dataDiario" value="${hoje}" style="width:100%;background:#000;border:1px solid #444;color:white;padding:10px;border-radius:6px;box-sizing:border-box;">
            </div>
            <div id="inputMensal" style="display:none;margin-bottom:20px;">
                <label style="display:block;color:#aaa;font-size:12px;margin-bottom:6px;">Mês/Ano</label>
                <input type="month" id="dataMensal" value="${mesAtual}" style="width:100%;background:#000;border:1px solid #444;color:white;padding:10px;border-radius:6px;box-sizing:border-box;">
            </div>
            <div id="inputAnual" style="display:none;margin-bottom:20px;">
                <label style="display:block;color:#aaa;font-size:12px;margin-bottom:6px;">Ano</label>
                <input type="number" id="dataAnual" value="${anoAtual}" min="2020" max="2099" style="width:100%;background:#000;border:1px solid #444;color:white;padding:10px;border-radius:6px;box-sizing:border-box;">
            </div>

            <div id="relatorioStatus" style="min-height:18px;margin-bottom:16px;font-size:13px;color:#888;"></div>

            <div style="display:flex;gap:10px;">
                <button onclick="gerarRelatorioXLSX()" style="flex:2;background:#e60000;color:white;border:none;padding:14px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:15px;"> BAIXAR XLSX</button>
                <button onclick="document.getElementById('modalRelatorio').remove()" style="flex:1;background:#222;color:#aaa;border:1px solid #333;padding:14px;border-radius:8px;cursor:pointer;">FECHAR</button>
            </div>
        </div>`;
    document.body.appendChild(modal);
    window._periodoRelatorio = 'DIARIO';
}

function selecionarPeriodo(periodo) {
    window._periodoRelatorio = periodo;
    const periodos = ['DIARIO','MENSAL','ANUAL'];
    periodos.forEach(p => {
        const btnId = 'r' + p.charAt(0) + p.slice(1).toLowerCase();
        const btn = document.getElementById(btnId);
        const div = document.getElementById('input' + p.charAt(0) + p.slice(1).toLowerCase());
        if (btn) {
            if (p === periodo) {
                btn.style.border = '2px solid #e60000';
                btn.style.background = '#1a0000';
                btn.style.color = 'white';
            } else {
                btn.style.border = '1px solid #333';
                btn.style.background = '#0a0a0a';
                btn.style.color = '#888';
            }
        }
        if (div) div.style.display = p === periodo ? 'block' : 'none';
    });
}

async function gerarRelatorioXLSX() {
    const status = document.getElementById('relatorioStatus');
    status.textContent = '⏳ Buscando dados...';
    status.style.color = '#ffcc00';

    const periodo = window._periodoRelatorio || 'DIARIO';
    let dataParam = '';

    if (periodo === 'DIARIO') {
        dataParam = document.getElementById('dataDiario')?.value || '';
    } else if (periodo === 'MENSAL') {
        const mes = document.getElementById('dataMensal')?.value || '';
        dataParam = mes ? mes + '-01' : '';
    } else if (periodo === 'ANUAL') {
        const ano = document.getElementById('dataAnual')?.value || new Date().getFullYear();
        dataParam = ano + '-01-01';
    }

    try {
        const url = `${API_URL}/relatorio/xlsx?tipo=${periodo}${dataParam ? '&dataInicio=' + dataParam : ''}`;
        status.textContent = ' Gerando planilha formatada...';
        status.style.color = '#ffcc00';

        const res = await fetch(url);
        if (!res.ok) {
            const t = await res.text();
            status.textContent = ' Erro: ' + t;
            status.style.color = 'red';
            return;
        }

        const blob = await res.blob();
        const contentDisposition = res.headers.get('Content-Disposition') || '';
        const nomeMatch = contentDisposition.match(/filename="?([^"]+)"?/);
        const labelPeriodo = {DIARIO:'Diário',MENSAL:'Mensal',ANUAL:'Anual'}[periodo];
        const sufixo = dataParam.replace(/-/g,'') || new Date().toISOString().slice(0,10).replace(/-/g,'');
        const nomeArq = nomeMatch ? nomeMatch[1] : `TSEA_Relatorio_${labelPeriodo}_${sufixo}.xlsx`;

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = nomeArq;
        a.click();
        URL.revokeObjectURL(a.href);

        status.textContent = ' Relatório gerado com sucesso!';
        status.style.color = '#00cc44';

    } catch (err) {
        console.error('Erro ao gerar relatório:', err);
        status.textContent = ' Erro ao gerar o relatório. Verifique o console.';
        status.style.color = 'red';
    }
}




// ===== GERENCIAR ACESSO =====

                        ${setor}
                    </span>
                </td>
                <td>
                    <span style="background:${ativo?'#003300':'#1a1a1a'}; color:${ativo?'#00ff00':'#ff4444'}; border:1px solid ${ativo?'#00ff00':'#ff4444'}; padding:3px 10px; border-radius:4px; font-size:11px; font-weight:bold;">
                        ${ativo ? 'ATIVO' : 'INATIVO'}
                    </span>

                    <button onclick="abrirModalEditarUsuario(${id}, '${nome}', '${cracha}', '${setor}', '${ativo?'ATIVO':'INATIVO'}')"
                        style="background:none; border:1px solid #444; color:#aaa; padding:6px 14px; border-radius:5px; cursor:pointer; font-size:12px; margin-right:6px;">

                        style="background:none; border:1px solid ${ativo?'#ff4444':'#00cc44'}; color:${ativo?'#ff4444':'#00cc44'}; padding:6px 14px; border-radius:5px; cursor:pointer; font-size:12px;">
                        ${ativo ? ' Desativar' : ' Ativar'}

                </td>
            </tr>`;
        }).join('');
    }

    document.getElementById('app').innerHTML = `
        <div style="display:flex; min-height:100vh; background:#080808;">
            <div style="width:260px; background:#000; border-right:1px solid #222; padding:20px; display:flex; flex-direction:column; justify-content:space-between; position:sticky; top:0; height:100vh;">
                <div>
                    <h2 style="color:white; margin-bottom:30px;">TSEA <span style="color:red;">ENERGIA</span></h2>
                    <nav>
                        <div class="menu-item" style="cursor:pointer; padding:10px; color:white;" onclick="mostrarAdmin()"> DASHBOARD</div>
                        <div class="menu-item" style="cursor:pointer; padding:10px; color:white;" onclick="mostrarOficina()"> OFICINA</div>
                        <div class="menu-item" style="cursor:pointer; padding:10px; color:white;" onclick="mostrarAlmoxerifado()"> ALMOXARIFADO</div>
                        <div class="menu-item" style="cursor:pointer; padding:10px; color:white;" onclick="mostrarInventario()"> INVENTÁRIO</div>
                        <div class="menu-item" style="cursor:pointer; padding:10px; color:white;" onclick="abrirModalRelatorio()"> RELATÓRIOS</div>
                        <div class="menu-item active" style="cursor:pointer; padding:10px; color:white; background:#111;" onclick="mostrarGerenciarAcesso()"> GERENCIAR ACESSO</div>
                    </nav>
                </div>
                <div style="border-top:1px solid #222; padding-top:20px;">
                    <div style="color:#aaa; font-size:14px; margin-bottom:10px;"> ${usuarioLogado ? usuarioLogado.nome : 'Administrador'}</div>
                    <button onclick="fazerLogout()" style="width:100%; background:#c00; color:white; border:none; padding:12px; cursor:pointer; border-radius:5px; font-weight:bold;">SAIR DA CONTA</button>
                </div>
            </div>

            <div style="flex:1; padding:30px; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                    <div>
                        <h1 style="color:white; margin:0 0 4px 0;"> Gerenciar <span style="color:#e60000;">Acesso</span></h1>
                        <p style="color:#555; margin:0; font-size:13px;">Ative, desative ou edite os dados dos funcionários cadastrados.</p>
                    </div>
                </div>

                <div style="background:#111; padding:12px 16px; border-radius:8px; border:1px solid #222; margin-bottom:20px; display:flex; align-items:center; gap:12px;">
                    <span style="color:#555;"></span>
                    <input type="text" id="buscaAcesso" placeholder="Buscar por nome ou crachá..."

                    <div style="display:flex; gap:8px;">
                        <button onclick="filtrarStatusAcesso('TODOS')" id="btnTodos"

                        <button onclick="filtrarStatusAcesso('ATIVO')" id="btnAtivos"

                        <button onclick="filtrarStatusAcesso('INATIVO')" id="btnInativos"
                            style="background:#222; color:#aaa; border:1px solid #333; padding:7px 16px; border-radius:5px; cursor:pointer; font-size:12px;">INATIVOS</button>
                    </div>
                </div>

                <div style="background:#111; border-radius:10px; border:1px solid #222; overflow:hidden;">
                    <table style="width:100%; border-collapse:collapse; color:white;">
                        <thead>
                            <tr style="background:#1a1a1a; color:#666; font-size:12px; text-align:left;">
                                <th style="padding:14px 15px;">NOME</th>
                                <th style="padding:14px;">CRACHÁ</th>
                                <th style="padding:14px;">TIPO</th>
                                <th style="padding:14px;">STATUS</th>
                                <th style="padding:14px; text-align:center;">AÇÕES</th>

    window._usuariosAcesso = usuarios;
    window._filtroStatusAcesso = 'TODOS';
    renderTabela(usuarios);
    window._renderTabelaAcesso = renderTabela;

function filtrarAcesso(termo) {
    const busca = termo.toUpperCase().trim();
    let lista = window._usuariosAcesso || [];
    if (window._filtroStatusAcesso && window._filtroStatusAcesso !== 'TODOS') {
        lista = lista.filter(u => (u.status||u.Status||'').toUpperCase() === window._filtroStatusAcesso);
    }
    if (busca) {
        lista = lista.filter(u => {
            const nome   = (u.nome  || u.Nome  || '').toUpperCase();
            const cracha = (u.codigoBarras || u.CodigoBarras || '').toUpperCase();
            return nome.includes(busca) || cracha.includes(busca);
        });
    }
    window._renderTabelaAcesso && window._renderTabelaAcesso(lista);
}

function filtrarStatusAcesso(status) {
    window._filtroStatusAcesso = status;
    const btns = { TODOS:'btnTodos', ATIVO:'btnAtivos', INATIVO:'btnInativos' };
    Object.entries(btns).forEach(([k, id]) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        if (k === status) {
            btn.style.background = '#e60000'; btn.style.color = 'white'; btn.style.border = 'none';
        } else {
            btn.style.background = '#222'; btn.style.color = '#aaa'; btn.style.border = '1px solid #333';
        }
    });
    const busca = document.getElementById('buscaAcesso')?.value || '';
    filtrarAcesso(busca);
}

async function alterarStatusUsuario(id, novoStatus) {
    const acao = novoStatus === 'INATIVO' ? 'desativar' : 'ativar';
    if (!confirm(`Deseja ${acao} este funcionário?`)) return;
    try {
        const res = await fetch(`${API_URL}/usuarios/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: novoStatus })
        });
        if (res.ok) {
            // Atualiza a lista local e re-renderiza
            const u = window._usuariosAcesso.find(x => (x.id||x.Id) == id);
            if (u) u.status = novoStatus;
            filtrarAcesso(document.getElementById('buscaAcesso')?.value || '');
        } else {
            const t = await res.text();
            alert('Erro: ' + t);
        }
    } catch(e) { alert('Erro de conexão.'); }
}

function abrirModalEditarUsuario(id, nome, cracha, setor, status) {
    const jaExiste = document.getElementById('modalEditarUsuario');
    if (jaExiste) jaExiste.remove();

    const modal = document.createElement('div');
    modal.id = 'modalEditarUsuario';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:4000;display:flex;justify-content:center;align-items:center;';
    modal.innerHTML = `
        <div style="background:#111; border:1px solid #333; border-radius:14px; padding:32px; width:420px; color:white; position:relative;">
            <h2 style="margin:0 0 6px 0;">Editar <span style="color:#e60000;">Funcionário</span></h2>
            <p style="color:#555; font-size:13px; margin:0 0 24px 0;">Crachá: <span style="color:#aaa; font-family:monospace;">${cracha}</span> &nbsp;|&nbsp; Tipo: <span style="color:#aaa;">${setor}</span></p>

            <label style="display:block; color:#aaa; font-size:12px; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;">Nome do Funcionário</label>
            <input type="text" id="editNome" value="${nome}"
                style="width:100%; background:#000; border:1px solid #444; color:white; padding:12px; border-radius:6px; font-size:15px; margin-bottom:24px; box-sizing:border-box;"
                placeholder="Nome completo">

            <label style="display:block; color:#aaa; font-size:12px; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Status</label>
            <div style="display:flex; gap:10px; margin-bottom:28px;">
                <button id="editBtnAtivo" onclick="selecionarStatusEdicao('ATIVO')"
                    style="flex:1; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold; border:2px solid ${status==='ATIVO'?'#00cc44':'#333'}; background:${status==='ATIVO'?'#003300':'#0a0a0a'}; color:${status==='ATIVO'?'#00cc44':'#888'};">
                     ATIVO
                </button>
                <button id="editBtnInativo" onclick="selecionarStatusEdicao('INATIVO')"
                    style="flex:1; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold; border:2px solid ${status==='INATIVO'?'#ff4444':'#333'}; background:${status==='INATIVO'?'#1a0000':'#0a0a0a'}; color:${status==='INATIVO'?'#ff4444':'#888'};">
                     INATIVO
                </button>
            </div>
            <input type="hidden" id="editStatusHidden" value="${status}">

            <div style="display:flex; gap:10px;">
                <button onclick="salvarEdicaoUsuario(${id})" style="flex:2; background:#e60000; color:white; border:none; padding:14px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px;">SALVAR</button>
                <button onclick="document.getElementById('modalEditarUsuario').remove()" style="flex:1; background:#222; color:#aaa; border:1px solid #333; padding:14px; border-radius:8px; cursor:pointer;">FECHAR</button>
            </div>
        </div>`;
    document.body.appendChild(modal);
}

function selecionarStatusEdicao(status) {
    document.getElementById('editStatusHidden').value = status;
    const btnAtivo   = document.getElementById('editBtnAtivo');
    const btnInativo = document.getElementById('editBtnInativo');
    if (status === 'ATIVO') {
        btnAtivo.style.border = '2px solid #00cc44'; btnAtivo.style.background = '#003300'; btnAtivo.style.color = '#00cc44';
        btnInativo.style.border = '2px solid #333';  btnInativo.style.background = '#0a0a0a'; btnInativo.style.color = '#888';
    } else {
        btnInativo.style.border = '2px solid #ff4444'; btnInativo.style.background = '#1a0000'; btnInativo.style.color = '#ff4444';
        btnAtivo.style.border = '2px solid #333';     btnAtivo.style.background = '#0a0a0a';  btnAtivo.style.color = '#888';
    }
}

async function salvarEdicaoUsuario(id) {
    const nome   = document.getElementById('editNome')?.value.trim();
    const status = document.getElementById('editStatusHidden')?.value;

    if (!nome) { alert('O nome não pode estar vazio.'); return; }

    try {
        const [resNome, resStatus] = await Promise.all([
            fetch(`${API_URL}/usuarios/${id}/editar`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome })
            }),
            fetch(`${API_URL}/usuarios/${id}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            })
        ]);

        if (resNome.ok && resStatus.ok) {
            document.getElementById('modalEditarUsuario')?.remove();
            // Atualiza lista local
            const u = window._usuariosAcesso?.find(x => (x.id||x.Id) == id);
            if (u) { u.nome = nome.toUpperCase(); u.status = status; }
            filtrarAcesso(document.getElementById('buscaAcesso')?.value || '');
        } else {
            const t = await (resNome.ok ? resStatus : resNome).text();
            alert('Erro ao salvar: ' + t);
        }
    } catch(e) { alert('Erro de conexão.'); }
}

    mostrarLogin();
</script>
